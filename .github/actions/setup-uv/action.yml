name: 'Setup uv'
description: 'Install uv and sync project dependencies'

inputs:
  python-version:
    description: 'Python version to install. Defaults to 3.12 to keep all utility jobs on a single supported interpreter; the pytest matrix passes its own version.'
    required: false
    default: '3.12'
  locked:
    description: 'Use --locked flag for uv sync. Set to false after version bumps that invalidate the lockfile.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 'Install uv'
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync ${{ inputs.locked == 'true' && '--locked' || '' }} --all-extras --all-groups
